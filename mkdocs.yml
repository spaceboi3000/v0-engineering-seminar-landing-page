site_name: RoboTalk 2026 - Developer Documentation
site_description: Technical documentation for the RoboTalk IEEE RAS NTUA event platform
site_author: IEEE RAS NTUA

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
      - Environment Setup: getting-started/setup.md
      - Deployment: getting-started/deployment.md
  - Architecture:
      - Overview: architecture/overview.md
      - Database Schema: architecture/database.md
      - API Routes: architecture/api.md
  - Components:
      - Landing Page: components/landing-page.md
      - Dashboard: components/dashboard.md
  - Guides:
      - Adapting for Future Events: guides/future-events.md
      - Admin Operations: guides/admin-ops.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
